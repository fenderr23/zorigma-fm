<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="%BASE_URL%images/zorigma-favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow, noarchive" />
    <title>Zorigma FM - Мусеныш, с днем рождения!</title>
    <meta name="description" content="музыкальный подарок специально для тебя" />
    <meta name="theme-color" content="#F5E6C8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: 'Lora', 'Georgia', serif;
        background: #1A1210;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        color: #E8D5C0;
      }
      
      .loading-container {
        text-align: center;
        color: #E8D5C0;
        max-width: 500px;
      }
      
      .loading-title {
        font-size: 2.5rem;
        margin-bottom: 1rem;
        font-family: 'Special Elite', 'Courier New', monospace;
        font-weight: 400;
        letter-spacing: 2px;
        color: #C49060;
      }
      
      .loading-subtitle {
        font-size: 1.2rem;
        margin-bottom: 2rem;
        opacity: 0.6;
        font-family: 'Lora', serif;
      }
      
      .loading-spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(196, 144, 96, 0.3);
        border-radius: 50%;
        border-top-color: #C49060;
        animation: spin 1s ease-in-out infinite;
        margin: 0 auto 2rem;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      .loading-message {
        font-size: 1rem;
        opacity: 0.5;
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
      }
      
      @media (max-width: 768px) {
        .loading-title {
          font-size: 2rem;
        }
        
        .loading-subtitle {
          font-size: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-container">
        <div class="loading-spinner"></div>
        <h1 class="loading-title">Zorigma FM</h1>
        <p class="loading-subtitle">Загружаем музыкальное поздравление...</p>
        <p class="loading-message">Если загрузка занимает слишком много времени, проверьте подключение к интернету</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
